# Compose file used for BOTH local dev and production.
#
# Local dev: only start Postgres, run Next.js with `npm run dev`:
#     docker compose up -d postgres
#     npm run dev
#
# Production: start everything:
#     docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: esnackcrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esnackcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esnackcrm_dev}
      POSTGRES_DB: ${POSTGRES_DB:-esnackcrm_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esnackcrm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: esnackcrm-app
    build: .
    container_name: esnackcrm-migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-esnackcrm}:${POSTGRES_PASSWORD:-esnackcrm_dev}@postgres:5432/${POSTGRES_DB:-esnackcrm_db}
    command: ["node", "scripts/migrate.mjs"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - prod

  app:
    image: esnackcrm-app
    build: .
    container_name: esnackcrm-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-esnackcrm}:${POSTGRES_PASSWORD:-esnackcrm_dev}@postgres:5432/${POSTGRES_DB:-esnackcrm_db}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      INITIAL_DASHBOARD_ADMIN_EMAIL: ${INITIAL_DASHBOARD_ADMIN_EMAIL:-}
      INITIAL_DASHBOARD_ADMIN_NAME: ${INITIAL_DASHBOARD_ADMIN_NAME:-Admin}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      CLIENTS_DIR: /srv/clients
      NEXT_PUBLIC_APP_URL: ${BETTER_AUTH_URL}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Manage containers on the host via Docker API
      - /var/run/docker.sock:/var/run/docker.sock
      # Per-client instance directories (clone + .env written here,
      # paths match the host so Docker daemon can bind-mount into stacks)
      - /srv/clients:/srv/clients
    profiles:
      - prod

volumes:
  postgres_data:
